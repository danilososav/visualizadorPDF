app = "facturador-paraguay"
primary_region = "sao"

[build]
dockerfile = "Dockerfile"

[env]
APP_ENV = "production"
APP_DEBUG = "false"
LOG_CHANNEL = "single"
DB_CONNECTION = "pgsql"

[processes]
app = "supervisord -c /etc/supervisor/conf.d/supervisord.conf"

[[services]]
internal_port = 8080
processes = ["app"]
protocol = "tcp"

[services.concurrency]
type = "connections"
hard_limit = 1000
soft_limit = 850

[[services.ports]]
port = 80
handlers = ["http"]
force_https = true

[[services.ports]]
port = 443
handlers = ["tls", "http"]

[services.http_checks]
enabled = true
grace_period = "30s"
interval = "10s"
timeout = "5s"
path = "/"

[[http_service.checks]]
grace_period = "10s"
interval = "10s"
timeout = "5s"
status = 200
method = "get"
path = "/"
protocol = "http"
